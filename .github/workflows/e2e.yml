name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright System Deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Get Supabase CLI version
        id: supabase-version
        run: echo "version=$(supabase --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Supabase Docker images
        id: supabase-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-images.tar.zst
          key: supabase-docker-${{ steps.supabase-version.outputs.version }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        if: steps.supabase-cache.outputs.cache-hit == 'true'
        run: zstd -d /tmp/supabase-docker-images.tar.zst --stdout | docker load

      - name: Start Supabase
        run: |
          # Start only the services needed for E2E tests (skip studio, realtime, storage, etc.)
          supabase start --exclude studio,realtime,storage-api,imgproxy,edge-runtime,logflare,vector,mailpit,postgres-meta,supavisor

          # Apply schema directly (more reliable than db reset which can timeout)
          docker exec -i supabase_db_dndscheduler psql -U postgres -d postgres < supabase/schema.sql

          # Show status for debugging
          supabase status

      - name: Save Docker images for cache
        if: steps.supabase-cache.outputs.cache-hit != 'true'
        run: |
          docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>' | xargs docker save | zstd -o /tmp/supabase-docker-images.tar.zst

      - name: Run E2E Tests
        run: npx playwright test
        env:
          # Local Supabase credentials (standard for local dev)
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          NEXT_PUBLIC_FEEDBACK_EMAIL: test@example.com
          NODE_ENV: test
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
